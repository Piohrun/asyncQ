apiVersion: 1

datasources:
  - name: AsyncQ Demo
    uid: asyncq-demo
    type: asyncq-kdbbackend-datasource
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      host: host.docker.internal
      port: 5000
      timeout: "5000"
      withTLS: false
      skipVerifyTLS: false
      withCACert: false
      enableAsync: true
      enableStreaming: true
      executionMode: sync
      compatibilityMode: native
      panopticonQueryWrapper: ""
      panopticonRequestFunction: ""
      syncMaxConnections: 4
      asyncMaxJobs: 16
      queryCacheEnabled: true
      queryCacheTTLSeconds: 60
      queryCacheMaxEntries: 128
      queryCacheTimeBucketSeconds: 0
      queryCacheStaleTTLSeconds: 0
      queryCacheKeyMode: strict
      queryCacheDiskEnabled: true
      queryCacheDiskMaxBytes: 1073741824
      queryCacheDiskMaxEntries: 10000
      queryCacheControlEnabled: true
      diagnosticsEnabled: true
      diagnosticsLogQueryText: false
      excelReportTemplateDirs: "$ASYNCQ_DEMO_TEMPLATE_DIR"
      excelReportMaxRows: 100000
      excelReportMaxFileBytes: 52428800
      excelReportTimeoutMs: 60000
      excelReports: |
        {
          "reports": [
            {
              "id": "demo-market-report",
              "name": "Demo market report",
              "description": "Latest demo prices and trades written to workbook data sheets.",
              "outputName": "{userId}_{reportType}_yyyymmddhhmm.xlsx",
              "metadata": {
                "reportType": "demo-market-report"
              },
              "templatePath": "$ASYNCQ_DEMO_TEMPLATE_DIR/asyncq-demo-report-template.xlsx",
              "compatibilityMode": "panopticon",
              "writeMode": "stream",
              "bindings": [
                {
                  "id": "last-prices",
                  "refId": "A",
                  "queryText": "select lastPrice:last price, trades:count i by sym from .demo.asyncq.trade where time within ({TimeWindowStart};{TimeWindowEnd}), sym in `$\" \" vs \"{symbols: }\"",
                  "sheet": "Summary",
                  "cell": "A1",
                  "includeHeader": true
                },
                {
                  "id": "latest-trades",
                  "refId": "B",
                  "queryText": "50#reverse select from .demo.asyncq.trade where time within ({TimeWindowStart};{TimeWindowEnd}), sym in `$\" \" vs \"{symbols: }\"",
                  "sheet": "Trades",
                  "cell": "A1",
                  "includeHeader": true
                }
              ]
            },
            {
              "id": "demo-panel-frame-report-cells",
              "name": "Demo panel data report - cells",
              "description": "Writes large submitted frames through the legacy per-cell Excel writer.",
              "outputName": "{userId}_cells_{reportType}_yyyymmddhhmmss.xlsx",
              "metadata": {
                "reportType": "demo-panel-data-report-cells"
              },
              "templatePath": "$ASYNCQ_DEMO_TEMPLATE_DIR/asyncq-demo-report-template.xlsx",
              "compatibilityMode": "panopticon",
              "queryCacheMode": "bypass",
              "timeOut": 30000,
              "maxDataPoints": 100000,
              "maxRows": 100000,
              "writeMode": "cells",
              "bindings": [
                {
                  "id": "large-summary",
                  "refId": "A",
                  "queryText": ".demo.asyncq.reportSummary[{reportRows}]",
                  "sheet": "Summary",
                  "cell": "A1",
                  "includeHeader": true
                },
                {
                  "id": "large-trades",
                  "refId": "B",
                  "queryText": ".demo.asyncq.reportRows[{reportRows}]",
                  "sheet": "Trades",
                  "cell": "A1",
                  "includeHeader": true
                }
              ]
            },
            {
              "id": "demo-panel-frame-report-rows",
              "name": "Demo panel data report - rows",
              "description": "Writes large submitted frames through excelize normal row helper mode.",
              "outputName": "{userId}_rows_{reportType}_yyyymmddhhmmss.xlsx",
              "metadata": {
                "reportType": "demo-panel-data-report-rows"
              },
              "templatePath": "$ASYNCQ_DEMO_TEMPLATE_DIR/asyncq-demo-report-template.xlsx",
              "compatibilityMode": "panopticon",
              "queryCacheMode": "bypass",
              "timeOut": 30000,
              "maxDataPoints": 100000,
              "maxRows": 100000,
              "writeMode": "rows",
              "bindings": [
                {
                  "id": "large-summary",
                  "refId": "A",
                  "queryText": ".demo.asyncq.reportSummary[{reportRows}]",
                  "sheet": "Summary",
                  "cell": "A1",
                  "includeHeader": true
                },
                {
                  "id": "large-trades",
                  "refId": "B",
                  "queryText": ".demo.asyncq.reportRows[{reportRows}]",
                  "sheet": "Trades",
                  "cell": "A1",
                  "includeHeader": true
                }
              ]
            },
            {
              "id": "demo-panel-frame-report",
              "name": "Demo panel data report - stream",
              "description": "Writes large submitted frames through excelize streaming writer mode.",
              "outputName": "{userId}_stream_{reportType}_yyyymmddhhmmss.xlsx",
              "metadata": {
                "reportType": "demo-panel-data-report-stream"
              },
              "templatePath": "$ASYNCQ_DEMO_TEMPLATE_DIR/asyncq-demo-report-template.xlsx",
              "compatibilityMode": "panopticon",
              "queryCacheMode": "bypass",
              "timeOut": 30000,
              "maxDataPoints": 100000,
              "maxRows": 100000,
              "writeMode": "stream",
              "bindings": [
                {
                  "id": "large-summary",
                  "refId": "A",
                  "queryText": ".demo.asyncq.reportSummary[{reportRows}]",
                  "sheet": "Summary",
                  "cell": "A1",
                  "includeHeader": true
                },
                {
                  "id": "large-trades",
                  "refId": "B",
                  "queryText": ".demo.asyncq.reportRows[{reportRows}]",
                  "sheet": "Trades",
                  "cell": "A1",
                  "includeHeader": true
                }
              ]
            }
          ]
        }
