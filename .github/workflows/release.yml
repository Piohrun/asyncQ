name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux-plugin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux backend binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/gpx_asyncq-kdbbackend-datasource_linux_amd64 ./pkg
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o dist/gpx_asyncq-kdbbackend-datasource_linux_arm64 ./pkg
          chmod +x dist/gpx_asyncq-kdbbackend-datasource_linux_amd64 dist/gpx_asyncq-kdbbackend-datasource_linux_arm64
          file dist/gpx_asyncq-kdbbackend-datasource_linux_amd64 dist/gpx_asyncq-kdbbackend-datasource_linux_arm64

      - name: Package plugin
        run: |
          mkdir -p release/asyncq-kdbbackend-datasource
          cp -R dist/. release/asyncq-kdbbackend-datasource/
          cd release
          zip -qr "asyncq-kdbbackend-datasource-${GITHUB_REF_NAME}-linux.zip" asyncq-kdbbackend-datasource
          tar -czf "asyncq-kdbbackend-datasource-${GITHUB_REF_NAME}-linux.tar.gz" asyncq-kdbbackend-datasource
          sha256sum "asyncq-kdbbackend-datasource-${GITHUB_REF_NAME}-linux.zip" > "asyncq-kdbbackend-datasource-${GITHUB_REF_NAME}-linux.zip.sha256"
          sha256sum "asyncq-kdbbackend-datasource-${GITHUB_REF_NAME}-linux.tar.gz" > "asyncq-kdbbackend-datasource-${GITHUB_REF_NAME}-linux.tar.gz.sha256"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(
            "release/asyncq-kdbbackend-datasource-${GITHUB_REF_NAME}-linux.zip"
            "release/asyncq-kdbbackend-datasource-${GITHUB_REF_NAME}-linux.zip.sha256"
            "release/asyncq-kdbbackend-datasource-${GITHUB_REF_NAME}-linux.tar.gz"
            "release/asyncq-kdbbackend-datasource-${GITHUB_REF_NAME}-linux.tar.gz.sha256"
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" \
              --notes "AsyncQ kdb+ datasource ${GITHUB_REF_NAME}. Linux plugin package with fully static amd64 and arm64 backend binaries."
          fi
